[project]
name = "corvus-corone-lib"
version = "0.1.0"
description = "HPO benchmarking core library."
requires-python = ">=3.13"
dependencies = [
	"gitpython>=3.1.46",
	"pydantic>=2.7.0",
	"numpy>=2.0",
	"scipy>=1.13",
	"click>=8.1",
	"matplotlib>=3.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
