[project]
name = "corvus-corone-pilot"
version = "0.1.0"
description = "AI-powered pilot for HPO benchmarking."
requires-python = ">=3.13"
dependencies = [
	"corvus-corone-lib",
	"langgraph>=0.2",
	"mcp>=1.0",
	"ollama>=0.3",
	"mlflow>=2.15",
	"xgboost>=2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corvus_corone_pilot"]
